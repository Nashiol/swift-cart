{% extends "base.html" %}

{% block content %}
<div class="container my-5">
    <h2>Send Message to {{ receiver.username }}</h2>
    <form method="POST">
        {% csrf_token %}
        <textarea name="content" rows="5" class="form-control" placeholder="Type your message..."></textarea>
        <button type="submit" class="btn btn-primary mt-3">Send Message</button>
    </form>
</div>
{% endblock %}
