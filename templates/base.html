{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SwiftCart TradeNest{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha384-k6RqeWeci5ZR/Lv4MR0sA0FfDOMa7zzMbF1D5Ff74nHpP/gTTd2zUu2nlHivvF3M" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}"> 
</head>
<body>
    <!-- Include the navbar -->
    {% include 'navbar.html' %}
    
    <!-- Main content block -->
    <div class="container mt-4">
        {% for message in messages %}
        {{message}}
        {%endfor%}
        {% block content %}
        <!-- Child template content will go here -->
        {% endblock %}
    </div>
    
    <!-- Footer -->
    {% include 'footer.html' %}
    
     <!-- jQuery, Popper.js, and Bootstrap JS -->
     <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
     <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
     <!-- Bootstrap JS (for navbar toggle) -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JavaScript -->
  
  
     <!-- Custom JavaScript for Dropdown -->
      <script>
         document.addEventListener('DOMContentLoaded', function() {
             const dropdownToggle = document.querySelectorAll('.dropdown-toggle');
             dropdownToggle.forEach(toggle => {
                 toggle.addEventListener('click', function(e) {
                     e.preventDefault();
                     const dropdownMenu = this.nextElementSibling;
                     if (dropdownMenu.style.display === 'block') {
                         dropdownMenu.style.display = 'none';
                     } else {
                         dropdownMenu.style.display = 'block';
                     }
                 });
             });
         });
     </script> 
 
</body>
</html>
